name: '[Rand] Build/Install/Test Arcane Framework (Ubuntu 24.04-26.04 / GCC 14-15 / CLang 21-22 / Full / Debug)'

on:
  schedule:
    - cron: '12 0 * * *'
  workflow_dispatch:

jobs:
  build-install-test:
    strategy:
      fail-fast: false
      matrix:
        image:
          - short: 'U24_G14'
            long: 'ubuntu-2404'
            compilo_name: 'gcc'
            compilo_version: '14'
            date: '20250830'
            args: '-DARCCORE_CXX_STANDARD=23'
            execute_tests: true

          - short: 'U24_C21'
            long: 'ubuntu-2404'
            compilo_name: 'clang'
            compilo_version: '21'
            date: '20250830'
            args: '-DARCCORE_CXX_STANDARD=23'
            execute_tests: true

          - short: 'U26_G15'
            long: 'ubuntu-2604'
            compilo_name: 'gcc'
            compilo_version: '15'
            date: '20260619'
            args: '-DARCCORE_CXX_STANDARD=23'
            execute_tests: true

          - short: 'U26_C22'
            long: 'ubuntu-2604'
            compilo_name: 'clang'
            compilo_version: '22'
            date: '20260619'
            args: '-DARCCORE_CXX_STANDARD=23'
            execute_tests: true

        version:
          - short: 'F'
            long: 'full'
            args: '-DARCANE_DISABLE_PERFCOUNTER_TESTS=ON
              -DPTScotch_INCLUDE_DIR="/usr/include/scotch"'

        config:
          - type: 'Debug'
            ctest_args: '--timeout 1200'

        runner:
          - runner_tag: 'ubuntu-latest'
            runner_name: 'GH'
            excluded_tests: '^.*([5-9]proc|[1-9][0-9]+proc|[5-9]thread|[1-9][0-9]+thread).*$'
            excluded_tests_with_labels: 'LARGE_HYBRID'
            ctest_parallel_jobs: '-j4'


    name: '[${{matrix.runner.runner_name}}][${{matrix.image.short}}_${{matrix.version.short}}]_OMPI_${{matrix.config.type}}'
    # La partie 'uses' est déterminée à la compilation, donc on ne peut pas mettre de variable ${{}}.
    uses: 'arcaneframework/gh_actions/.github/workflows/reusable_test_framework.yml@v3'
    secrets: inherit
    with:
      # image: ghcr.io/arcaneframework/${{matrix.image.long}}:${{matrix.image.compilo_name}}-${{matrix.image.compilo_version}}_${{matrix.version.long}}_${{matrix.image.date}}
      image: |-
        ${{ format(
          case( 
            matrix.image.date == 'latest', 'ghcr.io/arcaneframework/{0}:{1}_{3}_latest',
            'ghcr.io/arcaneframework/{0}:{1}-{2}_{3}_{4}'),
          matrix.image.long, matrix.image.compilo_name, matrix.image.compilo_version, matrix.version.long, matrix.image.date
        ) }}
      compilo_name: ${{ matrix.image.compilo_name }}
      compilo_version: ${{ matrix.image.compilo_version }}
      mpi: OMPI
      type_build: ${{ matrix.config.type }}
      cmake_additionnal_args: '${{ matrix.image.args }} ${{ matrix.version.args }}'
      verbose: true
      with_samples: true
      with_rand_script: true
      execute_tests: ${{ matrix.image.execute_tests }}
      excluded_tests: ${{ matrix.runner.excluded_tests }}
      excluded_tests_with_labels: ${{ matrix.runner.excluded_tests_with_labels }}
      ctest_additionnal_args: '${{ matrix.config.ctest_args }} ${{ matrix.runner.ctest_parallel_jobs }}'
      use_cache: false
      artifact_key_prefix: ${{matrix.image.short}}_${{matrix.version.short}}_${{matrix.mpi.implementation}}_${{matrix.config.type}}
      runner_tag: ${{ matrix.runner.runner_tag }}
